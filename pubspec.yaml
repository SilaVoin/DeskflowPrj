name: deskflow
description: "Deskflow — mobile CRM for e-commerce teams with contextual order chat."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State Management — Riverpod with code generation
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1
  app_links: ^6.3.3

  # Supabase
  supabase_flutter: ^2.9.0

  # OAuth
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5

  # Local storage
  shared_preferences: ^2.3.4

  # Logging
  logger: ^2.5.0
  permission_handler: ^12.0.1
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  riverpod_generator: ^2.6.4
  build_runner: ^2.4.14
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.4
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/env.json
    - assets/backgrounds/
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
